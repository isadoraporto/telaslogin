<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylelogin1.css">
</head>
<body>
    <div class="card">
<h1 class="h1">Bem-vindo de volta</h1>
<p class="p1">Faça login para continuar</p>

<p style="margin-left: 30px; font-weight: 500;">Email</p>
<input class="input" type="email"
id="email"
placeholder="Digite seu email aqui"
required
> <br>
<p style="margin-left: 30px; font-weight: 500;">Senha</p>
<input class="input" type="password"
id="senha"
placeholder="Digite sua senha aqui"
required
> <br>

<button class="button" type="button">
    Entrar
</button>


<p class="p2">Ainda não tem conta? <span class="span">Cadastre-se</span></p>


    </div>
</body>
</html>
